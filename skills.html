<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Kate Linehan | Skills</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css?v=20260310p" />
  </head>
  <body data-page="skills">
    <div class="announcement">
      <div class="container announcement__inner">
        <p>
          <span id="announcementIntro"></span>
          <a id="announcementLink" href="#" target="_blank" rel="noreferrer"></a>.
        </p>
      </div>
    </div>

    <header class="nav">
      <div class="container nav__inner">
        <div class="brand">KATE LINEHAN</div>
        <nav class="nav__links" aria-label="Primary">
          <a href="./index.html">HOME</a>
          <a href="./about.html">ABOUT</a>
          <a href="./skills.html">SKILLS</a>
          <a href="./resources.html">RESOURCES</a>
        </nav>
        <button
          class="nav__toggle"
          type="button"
          aria-label="Toggle navigation menu"
          aria-controls="mobileNavMenu"
          aria-expanded="false"
        >
          <span class="nav__toggleLines" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>
      </div>
      <nav id="mobileNavMenu" class="mobileNavMenu" aria-label="Mobile Primary">
        <a href="./index.html">Home</a>
        <a href="./about.html">About</a>
        <a href="./skills.html">Skills</a>
        <a href="./resources.html">Resources</a>
      </nav>
    </header>

    <main class="section section--alt">
      <div class="container section__inner">
        <h1 id="capabilitiesToolsTitle" class="section__title"></h1>
        <div id="capabilitiesToolsGroups" class="skillsToolsGrid"></div>

        <section class="coursesSection" aria-labelledby="coursesCertificationsTitle">
          <h2 id="coursesCertificationsTitle" class="section__title"></h2>
          <div id="coursesCertificationsCards" class="coursesGrid"></div>
        </section>
      </div>
    </main>

    <div id="courseModal" class="courseModal" hidden>
      <div class="courseModal__backdrop" data-course-modal-close></div>
      <div class="courseModal__panel" role="dialog" aria-modal="true" aria-labelledby="courseModalTitle">
        <button
          id="courseModalCloseButton"
          class="courseModal__close"
          type="button"
          aria-label="Close course details"
          data-course-modal-close
        >
          ×
        </button>
        <h3 id="courseModalTitle" class="courseModal__title"></h3>
        <p id="courseModalProvider" class="courseModal__provider"></p>
        <p id="courseModalYear" class="courseModal__year"></p>
        <p id="courseModalDescription" class="courseModal__description"></p>
        <a
          id="courseModalLink"
          class="courseModal__link"
          href="#"
          target="_blank"
          rel="noreferrer"
        >
          View certification
        </a>
      </div>
    </div>

    <footer class="footer">
      <div class="container footer__inner">
        <span>(c) <span id="year"></span> <span id="footerName">Katie Linehan</span></span>
      </div>
    </footer>

    <script src="./content.js?v=20260310p"></script>
    <script src="./platform.js?v=20260310p"></script>
  </body>
</html>
