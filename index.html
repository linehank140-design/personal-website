<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Katie Linehan | eCommerce &amp; Digital Merchandising Strategist</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css?v=20260310p" />
  </head>

  <body data-page="index">
    <div class="announcement">
      <div class="container announcement__inner">
        <p>
          <span id="announcementIntro"></span>
          <a id="announcementLink" href="#" target="_blank" rel="noreferrer"></a>.
        </p>
      </div>
    </div>

    <header class="nav">
      <div class="container nav__inner">
        <div class="brand">KATIE LINEHAN (AGATE)</div>

        <nav class="nav__links" aria-label="Primary">
          <a href="./index.html">HOME</a>
          <a href="./about.html">ABOUT</a>
          <a href="./skills.html">SKILLS</a>
          <a href="./resources.html">RESOURCES</a>
        </nav>

        <button
          class="nav__toggle"
          type="button"
          aria-label="Toggle navigation menu"
          aria-controls="mobileNavMenu"
          aria-expanded="false"
        >
          <span class="nav__toggleLines" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>
      </div>
      <nav id="mobileNavMenu" class="mobileNavMenu" aria-label="Mobile Primary">
        <a href="./index.html">Home</a>
        <a href="./about.html">About</a>
        <a href="./skills.html">Skills</a>
        <a href="./resources.html">Resources</a>
      </nav>
    </header>

    <main id="home" class="hero">
      <div class="container hero__inner">
        <div class="hero__copy">
          <p id="heroName" class="hero__name"></p>
          <h1 id="heroHeadline" class="hero__headline"></h1>
          <p id="heroSubhead" class="hero__subhead"></p>
          <p id="heroMetaLine" class="hero__metaLine"></p>
          <div class="hero__buttons">
            <a id="heroSelectedWorkLink" class="btn btn--interview" href="#case-studies"></a>
            <a id="heroInterviewLink" class="btn btn--ghost" href="./contact.html"></a>
          </div>
        </div>

        <div class="hero__media">
          <div class="photoFrame">
            <img
              class="photo"
              src="./Headshot_Katie copy.png"
              alt="Photo of Katie Linehan"
              loading="eager"
            />
          </div>
        </div>
      </div>
    </main>

    <section id="key-results" class="section">
      <div class="container section__inner">
        <h2 id="keyResultsTitle" class="section__title"></h2>
        <div id="keyResultsList" class="keyResultsList"></div>
      </div>
    </section>

    <section id="about" class="section section--alt">
      <div class="container section__inner">
        <h2 id="aboutTitle" class="section__title"></h2>
        <div id="aboutSummary" class="aboutSummary"></div>
      </div>
    </section>

    <section id="case-studies" class="section">
      <div class="container section__inner">
        <h2 id="caseStudiesTitle" class="section__title"></h2>
        <p id="caseStudiesIntro" class="section__lede"></p>
        <div id="caseStudiesCards" class="caseStudiesGrid"></div>
        <a id="caseStudiesBackToTop" class="backToTopLink" href="#home"></a>
      </div>
    </section>

    <section id="platforms-retailers" class="section section--alt">
      <div class="container section__inner">
        <h2 id="platformsRetailersTitle" class="section__title"></h2>
        <p id="platformsRetailersLede" class="section__lede"></p>
        <div id="platformsRetailersList" class="logoGrid"></div>
      </div>
    </section>

    <section id="industry-reading" class="section">
      <div class="container section__inner">
        <h2 id="industryReadingTitle" class="section__title"></h2>
        <p id="industryReadingLede" class="section__lede"></p>
        <div class="readingScroller" data-reading-scroller>
          <button
            class="readingScroller__button readingScroller__button--prev"
            type="button"
            aria-label="Scroll to previous articles"
            data-reading-prev
          >
            <span aria-hidden="true">&larr;</span>
          </button>
          <div class="readingScroller__viewport" data-reading-viewport>
            <div id="industryReadingCards" class="readingGrid"></div>
          </div>
          <button
            class="readingScroller__button readingScroller__button--next"
            type="button"
            aria-label="Scroll to next articles"
            data-reading-next
          >
            <span aria-hidden="true">&rarr;</span>
          </button>
        </div>
      </div>
    </section>

    <section id="contact" class="section">
      <div class="container section__inner">
        <h2 id="contactTitle" class="section__title"></h2>
        <p id="contactLede" class="section__lede"></p>
        <div class="contactActions">
          <a
            id="contactLinkedInLink"
            class="contactLinkedIn"
            href="#"
            target="_blank"
            rel="noreferrer"
          ></a>
          <a id="contactEmailLink" class="contactLinkedIn" href="#"></a>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container footer__inner">
        <span>(c) <span id="year"></span> <span id="footerName">Katie Linehan</span></span>
      </div>
    </footer>

    <script src="./content.js?v=20260310p"></script>
    <script src="./platform.js?v=20260310p"></script>
  </body>
</html>
