<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Kate Linehan | eCommerce &amp; Digital Merchandising Strategist</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css?v=20260309" />
  </head>

  <body data-page="index">
    <div class="announcement">
      <div class="container announcement__inner">
        <p>
          <span id="announcementIntro"></span>
          <a id="announcementLink" href="#" target="_blank" rel="noreferrer"></a>.
        </p>
      </div>
    </div>

    <header class="nav">
      <div class="container nav__inner">
        <div class="brand">KATE LINEHAN</div>

        <nav class="nav__links" aria-label="Primary">
          <a href="#home">HOME</a>
          <a href="#about">ABOUT</a>
          <a href="#selected-work">SELECTED WORK</a>
          <a href="#growth-framework">GROWTH</a>
          <a href="#skills-tools">SKILLS</a>
          <a href="#contact">CONTACT</a>
        </nav>

        <button
          class="nav__toggle"
          type="button"
          aria-label="Toggle navigation menu"
          aria-controls="mobileNavMenu"
          aria-expanded="false"
        >
          <span class="nav__toggleLines" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>
      </div>
      <nav id="mobileNavMenu" class="mobileNavMenu" aria-label="Mobile Primary">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#selected-work">Selected Work</a>
        <a href="#growth-framework">Growth</a>
        <a href="#skills-tools">Skills</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <main id="home" class="hero">
      <div class="container hero__inner">
        <div class="hero__copy">
          <p id="heroName" class="hero__name"></p>
          <h1 id="heroHeadline" class="hero__headline"></h1>
          <p id="heroSubhead" class="hero__subhead"></p>
          <p id="heroMetaLine" class="hero__metaLine"></p>
          <div class="hero__buttons">
            <a id="heroSelectedWorkLink" class="btn btn--interview" href="#selected-work"></a>
            <a id="heroInterviewLink" class="btn btn--ghost" href="#contact"></a>
          </div>
        </div>

        <div class="hero__media">
          <div class="photoFrame">
            <img
              class="photo"
              src="./Headshot_Katie copy.png"
              alt="Photo of Kate Linehan"
              loading="eager"
            />
          </div>
        </div>
      </div>
    </main>

    <section id="about" class="section section--alt">
      <div class="container section__inner">
        <h2 id="aboutTitle" class="section__title"></h2>
        <div id="aboutSummary" class="aboutSummary"></div>
      </div>
    </section>

    <section id="selected-work" class="section">
      <div class="container section__inner">
        <h2 id="selectedWorkTitle" class="section__title"></h2>
        <div id="selectedWorkCards" class="selectedWorkGrid"></div>
      </div>
    </section>

    <section id="growth-framework" class="section">
      <div class="container section__inner">
        <h2 id="growthFrameworkTitle" class="section__title"></h2>
        <p id="growthFrameworkIntro" class="section__lede"></p>
        <ol id="growthFrameworkList" class="growthFrameworkList"></ol>
        <p id="growthFrameworkOutro" class="section__lede"></p>
      </div>
    </section>

    <section id="skills-tools" class="section section--alt">
      <div class="container section__inner">
        <h2 id="skillsToolsTitle" class="section__title"></h2>
        <div id="skillsToolsGroups" class="skillsToolsGrid"></div>
      </div>
    </section>

    <section id="contact" class="section">
      <div class="container section__inner">
        <h2 id="contactTitle" class="section__title"></h2>
        <p id="contactLede" class="section__lede"></p>
        <div class="contactActions">
          <a
            id="contactLinkedInLink"
            class="contactLinkedIn"
            href="#"
            target="_blank"
            rel="noreferrer"
          ></a>
          <a id="contactEmailLink" class="contactLinkedIn" href="#"></a>
          <a
            id="contactResumeLink"
            class="btn btn--ghost"
            href="#"
            target="_blank"
            rel="noreferrer"
            hidden
          ></a>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container footer__inner">
        <span>(c) <span id="year"></span> <span id="footerName">Katie Linehan</span></span>
      </div>
    </footer>

    <script src="./content.js?v=20260309"></script>
    <script src="./platform.js?v=20260309"></script>
  </body>
</html>
